<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 435" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="aD" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <marker id="aR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c92a2a"/>
    </marker>
  </defs>

  <rect width="920" height="435" fill="#ffffff"/>

  <text x="460" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#0B132B">
    Contingências: onde cada uma ataca o laço do SRF-PLL
  </text>

  <!-- ===================== REFERENCE CIRCUIT (top) ===================== -->
  <text x="50" y="65" font-size="11" font-weight="700" fill="#6b7280">CIRCUITO DE REFERÊNCIA</text>
  <line x1="40" y1="72" x2="880" y2="72" stroke="#e5e7eb" stroke-width="1"/>

  <!-- VSI -->
  <rect x="80" y="115" width="80" height="60" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2" rx="4"/>
  <text x="120" y="142" text-anchor="middle" font-size="12" font-weight="700" fill="#0B132B">VSI</text>
  <text x="120" y="160" text-anchor="middle" font-size="10" fill="#0B132B">+ ctrl dq</text>

  <!-- L1 -->
  <line x1="160" y1="145" x2="180" y2="145" stroke="#0B132B" stroke-width="2"/>
  <path d="M 180 145 q 7 -10 14 0 q 7 -10 14 0 q 7 -10 14 0" fill="none" stroke="#0B132B" stroke-width="2"/>
  <text x="201" y="128" text-anchor="middle" font-size="11" font-style="italic" fill="#0B132B">L₁</text>
  <line x1="222" y1="145" x2="280" y2="145" stroke="#0B132B" stroke-width="2"/>

  <!-- PCC node -->
  <circle cx="280" cy="145" r="5" fill="#0B132B"/>
  <text x="280" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#F97316">PCC</text>

  <!-- Cf branch (compact) -->
  <line x1="280" y1="145" x2="280" y2="180" stroke="#0B132B" stroke-width="2"/>
  <line x1="268" y1="180" x2="292" y2="180" stroke="#0B132B" stroke-width="2.5"/>
  <line x1="268" y1="187" x2="292" y2="187" stroke="#0B132B" stroke-width="2.5"/>
  <text x="300" y="187" font-size="11" font-style="italic" fill="#0B132B">C<tspan baseline-shift="sub" font-size="75%">f</tspan></text>
  <line x1="280" y1="187" x2="280" y2="205" stroke="#0B132B" stroke-width="2"/>
  <line x1="268" y1="205" x2="292" y2="205" stroke="#0B132B" stroke-width="2.5"/>
  <line x1="272" y1="211" x2="288" y2="211" stroke="#0B132B" stroke-width="2"/>
  <line x1="276" y1="216" x2="284" y2="216" stroke="#0B132B" stroke-width="2"/>

  <!-- L2 -->
  <line x1="280" y1="145" x2="335" y2="145" stroke="#0B132B" stroke-width="2"/>
  <path d="M 335 145 q 7 -10 14 0 q 7 -10 14 0 q 7 -10 14 0" fill="none" stroke="#0B132B" stroke-width="2"/>
  <text x="356" y="128" text-anchor="middle" font-size="11" font-style="italic" fill="#0B132B">L₂</text>
  <line x1="377" y1="145" x2="430" y2="145" stroke="#0B132B" stroke-width="2"/>

  <!-- Z_th -->
  <rect x="430" y="135" width="55" height="20" fill="white" stroke="#0B132B" stroke-width="2"/>
  <text x="457" y="149" text-anchor="middle" font-size="11" font-style="italic" fill="#0B132B">Z<tspan baseline-shift="sub" font-size="75%">th</tspan></text>
  <line x1="485" y1="145" x2="535" y2="145" stroke="#0B132B" stroke-width="2"/>

  <!-- AC source -->
  <circle cx="565" cy="145" r="26" fill="white" stroke="#0B132B" stroke-width="2"/>
  <path d="M 547 145 q 4.5 -10 9 0 q 4.5 10 9 0 q 4.5 -10 9 0 q 4.5 10 9 0" fill="none" stroke="#0B132B" stroke-width="1.5"/>
  <text x="565" y="187" text-anchor="middle" font-size="10" fill="#0B132B">Rede</text>

  <!-- Sample to PLL -->
  <line x1="280" y1="145" x2="280" y2="92" stroke="#1971c2" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="280" cy="86" r="9" fill="white" stroke="#1971c2" stroke-width="1.5"/>
  <text x="280" y="90" text-anchor="middle" font-size="10" font-weight="700" fill="#1971c2">V</text>

  <!-- PLL box -->
  <rect x="660" y="115" width="190" height="60" fill="#fff7ed" stroke="#F97316" stroke-width="2" rx="5"/>
  <text x="755" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#0B132B">SRF-PLL</text>
  <text x="755" y="156" text-anchor="middle" font-size="10" fill="#0B132B">Park · PI(K<tspan baseline-shift="sub" font-size="75%">p</tspan>,K<tspan baseline-shift="sub" font-size="75%">i</tspan>) · 1/s</text>
  <text x="755" y="170" text-anchor="middle" font-size="10" fill="#0B132B">→ φ̂ ao controlador dq</text>
  <line x1="289" y1="86" x2="660" y2="86" stroke="#1971c2" stroke-width="1.5"/>
  <path d="M 660 86 L 660 115" stroke="#1971c2" stroke-width="1.5" marker-end="url(#aD)"/>

  <!-- ===== Fault markers on circuit ===== -->
  <!-- Marker 1: 3-phase fault at PCC (down to ground) -->
  <g>
    <line x1="265" y1="145" x2="245" y2="245" stroke="#c92a2a" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="245" cy="245" r="11" fill="#c92a2a" stroke="#7a0d0d" stroke-width="1.5"/>
    <text x="245" y="249" text-anchor="middle" font-size="11" font-weight="700" fill="white">1</text>
  </g>
  <!-- Marker 2: 1-phase fault near PCC -->
  <g>
    <line x1="295" y1="145" x2="320" y2="245" stroke="#c92a2a" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="320" cy="245" r="11" fill="#c92a2a" stroke="#7a0d0d" stroke-width="1.5"/>
    <text x="320" y="249" text-anchor="middle" font-size="11" font-weight="700" fill="white">2</text>
  </g>

  <!-- ===================== CONTINGENCY PANELS (bottom 1x2 grid) ===================== -->
  <text x="50" y="285" font-size="11" font-weight="700" fill="#6b7280">EFEITO DE CADA CONTINGÊNCIA NO LAÇO</text>
  <line x1="40" y1="292" x2="880" y2="292" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ========== Panel 1: Sag simétrico ========== -->
  <g transform="translate(40,305)">
    <rect x="0" y="0" width="420" height="105" fill="#fff5f5" stroke="#c92a2a" stroke-width="1.5" rx="6"/>
    <circle cx="22" cy="22" r="12" fill="#c92a2a"/>
    <text x="22" y="27" text-anchor="middle" font-size="12" font-weight="700" fill="white">1</text>
    <text x="42" y="22" font-size="12" font-weight="700" fill="#0B132B">Sag simétrico</text>
    <text x="42" y="38" font-size="10" fill="#6b7280">curto 3φ distante · cai U sem desequilíbrio</text>

    <!-- mini fault symbol: switch closing to ground -->
    <g transform="translate(20,55)">
      <line x1="0" y1="0" x2="40" y2="0" stroke="#0B132B" stroke-width="1.5"/>
      <line x1="40" y1="0" x2="55" y2="-10" stroke="#c92a2a" stroke-width="1.5"/>
      <circle cx="40" cy="0" r="2" fill="#0B132B"/>
      <circle cx="60" cy="0" r="2" fill="#0B132B"/>
      <line x1="60" y1="0" x2="80" y2="0" stroke="#0B132B" stroke-width="1.5"/>
      <line x1="80" y1="0" x2="80" y2="15" stroke="#0B132B" stroke-width="1.5"/>
      <line x1="70" y1="15" x2="90" y2="15" stroke="#0B132B" stroke-width="2"/>
      <line x1="74" y1="20" x2="86" y2="20" stroke="#0B132B" stroke-width="1.5"/>
      <text x="40" y="38" font-size="9" fill="#6b7280">falta 3φ-terra</text>
    </g>

    <!-- mini u_q waveform: low amplitude (damped) -->
    <g transform="translate(150,75)">
      <line x1="0" y1="0" x2="120" y2="0" stroke="#cbd5e1" stroke-width="0.8"/>
      <path d="M 0 0 q 8 -18 16 0 q 8 18 16 0 q 8 -8 16 0 q 8 8 16 0 q 8 -4 16 0 q 8 4 16 0 q 8 -2 16 0"
            fill="none" stroke="#c92a2a" stroke-width="1.5"/>
      <text x="60" y="22" text-anchor="middle" font-size="10" font-style="italic" fill="#0B132B">u<tspan baseline-shift="sub" font-size="75%">q</tspan>: amplitude cai</text>
    </g>

    <text x="290" y="60" font-size="10" fill="#0B132B">Impacto:</text>
    <text x="290" y="75" font-size="10" fill="#0B132B">malha desacelera</text>
    <text x="290" y="89" font-size="10" fill="#0B132B">(depende de U)</text>
  </g>

  <!-- ========== Panel 2: Sag assimétrico ========== -->
  <g transform="translate(470,305)">
    <rect x="0" y="0" width="410" height="105" fill="#fff5f5" stroke="#c92a2a" stroke-width="1.5" rx="6"/>
    <circle cx="22" cy="22" r="12" fill="#c92a2a"/>
    <text x="22" y="27" text-anchor="middle" font-size="12" font-weight="700" fill="white">2</text>
    <text x="42" y="22" font-size="12" font-weight="700" fill="#0B132B">Sag assimétrico</text>
    <text x="42" y="38" font-size="10" fill="#6b7280">curto 1φ ou 2φ · introduz sequência negativa</text>

    <!-- mini fault: only one phase shorted -->
    <g transform="translate(20,55)">
      <line x1="0" y1="-8" x2="80" y2="-8" stroke="#0B132B" stroke-width="1" opacity="0.4"/>
      <line x1="0" y1="0" x2="80" y2="0" stroke="#0B132B" stroke-width="1.5"/>
      <line x1="0" y1="8" x2="80" y2="8" stroke="#0B132B" stroke-width="1" opacity="0.4"/>
      <line x1="40" y1="0" x2="40" y2="18" stroke="#c92a2a" stroke-width="1.5"/>
      <line x1="30" y1="18" x2="50" y2="18" stroke="#c92a2a" stroke-width="2"/>
      <text x="40" y="38" font-size="9" fill="#6b7280">falta 1φ-terra</text>
    </g>

    <!-- mini u_q waveform: ripple 120 Hz on top -->
    <g transform="translate(150,75)">
      <line x1="0" y1="0" x2="120" y2="0" stroke="#cbd5e1" stroke-width="0.8"/>
      <path d="M 0 -5 q 3 -6 6 0 q 3 6 6 0 q 3 -6 6 0 q 3 6 6 0 q 3 -6 6 0 q 3 6 6 0 q 3 -6 6 0 q 3 6 6 0 q 3 -6 6 0 q 3 6 6 0 q 3 -6 6 0 q 3 6 6 0 q 3 -6 6 0 q 3 6 6 0 q 3 -6 6 0 q 3 6 6 0 q 3 -6 6 0 q 3 6 6 0 q 3 -6 6 0 q 3 6 6 0"
            fill="none" stroke="#c92a2a" stroke-width="1.5"/>
      <text x="60" y="22" text-anchor="middle" font-size="10" font-style="italic" fill="#0B132B">u<tspan baseline-shift="sub" font-size="75%">q</tspan>: oscilação 120 Hz</text>
    </g>

    <text x="290" y="60" font-size="10" fill="#0B132B">Impacto:</text>
    <text x="290" y="75" font-size="10" fill="#0B132B">P, Q oscilam</text>
    <text x="290" y="89" font-size="10" fill="#0B132B">no dobro da freq.</text>
  </g>
</svg>
