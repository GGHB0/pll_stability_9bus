<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0B132B"/>
    </marker>
    <marker id="arrCtrl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F97316"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1971c2"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c92a2a"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#ffffff"/>

  <text x="440" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#0B132B">Submódulo 2.10 — malha de referência de corrente (função ONS_2_11)</text>
  <text x="440" y="48" text-anchor="middle" font-size="10" fill="#0B132B">Injeção de corrente reativa sob defeito — ONS, Submódulo 2.10, §5.8</text>

  <!-- legenda das tres zonas de tensao -->
  <g font-size="9" text-anchor="middle">
    <rect x="190" y="60" width="155" height="20" rx="9" fill="#fdecec" stroke="#c92a2a"/>
    <text x="267" y="74" fill="#c92a2a">Subtensão · V &lt; 0,85 pu</text>
    <rect x="357" y="60" width="165" height="20" rx="9" fill="#f0fdf4" stroke="#166534"/>
    <text x="439" y="74" fill="#166534">Normal · 0,85 ≤ V ≤ 1,1 pu</text>
    <rect x="534" y="60" width="155" height="20" rx="9" fill="#fff4e6" stroke="#e8590c"/>
    <text x="611" y="74" fill="#e8590c">Sobretensão · V &gt; 1,1 pu</text>
  </g>

  <!-- entrada V_PCC (medicao) com ramal para o detector de defeito -->
  <text x="18" y="164" font-size="11" font-style="italic" fill="#1971c2">V<tspan baseline-shift="sub" font-size="75%">PCC</tspan> (pu)</text>
  <line x1="78" y1="160" x2="130" y2="160" stroke="#1971c2" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrB)"/>
  <path d="M 100 160 L 100 309 A 6 6 0 0 1 100 321 L 100 374 A 6 6 0 0 1 100 386 L 100 427 L 130 427"
        fill="none" stroke="#1971c2" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrB)"/>
  <circle cx="100" cy="160" r="2.2" fill="#1971c2"/>

  <!-- bloco da curva ONS iq_ref(V) -->
  <rect x="130" y="95" width="180" height="130" fill="#ffffff" stroke="#0B132B" stroke-width="1.8" rx="6"/>
  <text x="220" y="113" text-anchor="middle" font-size="10" font-weight="700" fill="#0B132B">Curva i<tspan baseline-shift="sub" font-size="75%">q,ref</tspan>(V) — §5.8.3</text>
  <g stroke="#0B132B" stroke-width="1" fill="none">
    <line x1="160" y1="125" x2="160" y2="196"/>
    <line x1="156" y1="140" x2="294" y2="140" stroke-dasharray="2,2" stroke="#94a3b8"/>
  </g>
  <path d="M 168 190 L 227 140" fill="none" stroke="#c92a2a" stroke-width="2"/>
  <path d="M 227 140 L 269 140" fill="none" stroke="#166534" stroke-width="2"/>
  <path d="M 269 140 L 286 190" fill="none" stroke="#e8590c" stroke-width="2"/>
  <g font-size="7.5" fill="#0B132B" text-anchor="middle">
    <text x="168" y="205">0,5</text>
    <text x="227" y="205">0,85</text>
    <text x="269" y="205">1,1</text>
    <text x="286" y="205">1,2</text>
  </g>
  <text x="152" y="143" text-anchor="end" font-size="7.5" fill="#0B132B">0</text>
  <text x="152" y="193" text-anchor="end" font-size="7.5" fill="#0B132B">−1</text>
  <text x="164" y="121" font-size="7.5" font-style="italic" fill="#0B132B">i<tspan baseline-shift="sub" font-size="75%">q,ref</tspan> (pu)</text>
  <text x="220" y="218" text-anchor="middle" font-size="7.5" font-style="italic" fill="#0B132B">V (pu)</text>

  <!-- saturacao +-Imax -->
  <line x1="310" y1="160" x2="355" y2="160" stroke="#0B132B" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="355" y="132" width="70" height="56" fill="#ffffff" stroke="#0B132B" stroke-width="1.8" rx="6"/>
  <path d="M 362 178 L 375 178 L 405 142 L 418 142" fill="none" stroke="#0B132B" stroke-width="2"/>
  <text x="390" y="204" text-anchor="middle" font-size="9" fill="#0B132B">saturação ±I<tspan baseline-shift="sub" font-size="75%">max</tspan></text>

  <!-- saida iq_ref + ramal para a prioridade de reativo -->
  <line x1="425" y1="160" x2="800" y2="160" stroke="#F97316" stroke-width="1.8" marker-end="url(#arrCtrl)"/>
  <circle cx="490" cy="160" r="2.2" fill="#F97316"/>
  <line x1="490" y1="160" x2="490" y2="280" stroke="#F97316" stroke-width="1.8" marker-end="url(#arrCtrl)"/>
  <text x="497" y="230" font-size="9" font-style="italic" fill="#F97316">i<tspan baseline-shift="sub" font-size="75%">q,ref</tspan></text>
  <text x="808" y="164" font-size="11" font-style="italic" fill="#F97316">i<tspan baseline-shift="sub" font-size="75%">q,ref</tspan></text>

  <!-- entrada Imax -->
  <text x="18" y="319" font-size="11" font-style="italic" fill="#0B132B">I<tspan baseline-shift="sub" font-size="75%">max</tspan></text>
  <line x1="48" y1="315" x2="400" y2="315" stroke="#0B132B" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- prioridade de corrente reativa -->
  <rect x="400" y="280" width="190" height="70" fill="#ffffff" stroke="#0B132B" stroke-width="1.8" rx="6"/>
  <text x="495" y="303" text-anchor="middle" font-size="10" font-weight="700" fill="#0B132B">Prioridade de reativo (§5.8.4)</text>
  <text x="495" y="330" text-anchor="middle" font-size="11" font-style="italic" fill="#0B132B">i<tspan baseline-shift="sub" font-size="75%">d,max</tspan> = √(I<tspan baseline-shift="sub" font-size="75%">max</tspan>² − i<tspan baseline-shift="sub" font-size="75%">q,ref</tspan>²)</text>

  <!-- bloco min -->
  <line x1="590" y1="315" x2="635" y2="315" stroke="#0B132B" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="612" y="308" text-anchor="middle" font-size="7.5" font-style="italic" fill="#0B132B">i<tspan baseline-shift="sub" font-size="75%">d,max</tspan></text>
  <rect x="635" y="285" width="75" height="60" fill="#ffffff" stroke="#0B132B" stroke-width="1.8" rx="6"/>
  <text x="672" y="320" text-anchor="middle" font-size="12" font-weight="700" fill="#0B132B">min</text>

  <!-- entrada id_nom entrando por baixo do min -->
  <text x="18" y="384" font-size="11" font-style="italic" fill="#0B132B">i<tspan baseline-shift="sub" font-size="75%">d,nom</tspan> (pu)</text>
  <path d="M 78 380 L 672 380 L 672 345" fill="none" stroke="#0B132B" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- saida id_ref -->
  <line x1="710" y1="315" x2="800" y2="315" stroke="#F97316" stroke-width="1.8" marker-end="url(#arrCtrl)"/>
  <text x="808" y="319" font-size="11" font-style="italic" fill="#F97316">i<tspan baseline-shift="sub" font-size="75%">d,ref</tspan></text>

  <!-- detector de defeito -> fault_flag -->
  <rect x="130" y="400" width="180" height="55" fill="#ffffff" stroke="#c92a2a" stroke-width="1.8" rx="6"/>
  <text x="220" y="422" text-anchor="middle" font-size="10" font-weight="700" fill="#c92a2a">Detecção de defeito</text>
  <text x="220" y="440" text-anchor="middle" font-size="9.5" fill="#c92a2a">V &lt; 0,85 ou V &gt; 1,1 (pu)</text>
  <line x1="310" y1="427" x2="800" y2="427" stroke="#c92a2a" stroke-width="1.5" marker-end="url(#arrR)"/>
  <text x="808" y="431" font-size="10" font-style="italic" fill="#c92a2a">fault_flag</text>
</svg>
