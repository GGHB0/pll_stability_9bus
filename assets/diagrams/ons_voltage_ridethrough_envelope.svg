<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrAxis2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
  </defs>

  <rect width="760" height="520" fill="#ffffff"/>

  <text x="380" y="26" text-anchor="middle" font-size="14.5" font-weight="700" fill="#0B132B">
    Tensão nos terminais dos aerogeradores/inversores — envelope de ride-through (ONS Submódulo 2.10)
  </text>

  <!-- ============= Dashed grid: horizontal (pu levels) ============= -->
  <line x1="90" y1="110" x2="430" y2="110" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="90" y1="140" x2="580" y2="140" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="90" y1="170" x2="120" y2="170" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="90" y1="200" x2="650" y2="200" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="90" y1="215" x2="260" y2="215" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="90" y1="430" x2="190" y2="430" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ============= Dashed grid: vertical (time marks) ============= -->
  <line x1="190" y1="430" x2="190" y2="460" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="260" y1="215" x2="260" y2="460" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="430" y1="110" x2="430" y2="460" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="580" y1="140" x2="580" y2="460" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ============= Ride-through envelope (shaded region) ============= -->
  <path d="M 90 110
           L 430 110
           L 430 140
           L 650 140
           L 650 200
           L 580 200
           L 580 215
           L 260 215
           L 190 430
           L 90 430
           Z"
        fill="#c3c9d1" stroke="#1f2937" stroke-width="2" stroke-linejoin="round"/>

  <!-- ============= Axes ============= -->
  <line x1="90" y1="460" x2="90" y2="95" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arrAxis2)"/>
  <line x1="60" y1="460" x2="695" y2="460" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arrAxis2)"/>

  <text x="95" y="82" font-size="13" font-style="italic" fill="#0B132B">Tensão (pu)</text>
  <text x="700" y="465" font-size="13" font-style="italic" fill="#0B132B">Time (s)</text>

  <!-- ============= Y tick labels ============= -->
  <text x="80" y="114" text-anchor="end" font-size="12" fill="#0B132B">1,2</text>
  <text x="80" y="144" text-anchor="end" font-size="12" fill="#0B132B">1,1</text>
  <text x="80" y="174" text-anchor="end" font-size="12" fill="#0B132B">1</text>
  <text x="80" y="204" text-anchor="end" font-size="12" fill="#0B132B">0,9</text>
  <text x="80" y="219" text-anchor="end" font-size="12" fill="#0B132B">0,85</text>
  <text x="80" y="434" text-anchor="end" font-size="12" fill="#0B132B">0,2</text>

  <!-- ============= X tick labels ============= -->
  <text x="90" y="480" text-anchor="middle" font-size="12" fill="#0B132B">0</text>
  <text x="190" y="480" text-anchor="middle" font-size="12" fill="#0B132B">0,5</text>
  <text x="260" y="480" text-anchor="middle" font-size="12" fill="#0B132B">1</text>
  <text x="430" y="480" text-anchor="middle" font-size="12" fill="#0B132B">2,5</text>
  <text x="580" y="480" text-anchor="middle" font-size="12" fill="#0B132B">5</text>

  <text x="380" y="505" text-anchor="middle" font-size="12.5" fill="#0B132B">
    Figura 13 - Tensão nos terminais dos aerogeradores ou inversores da central geradora.
  </text>
</svg>
