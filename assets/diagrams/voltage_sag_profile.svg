<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrN" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0B132B"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c92a2a"/>
    </marker>
  </defs>

  <rect width="760" height="430" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#0B132B">
    Perfil característico de um afundamento de tensão
  </text>

  <!-- ============= Axes ============= -->
  <line x1="80" y1="60" x2="80" y2="360" stroke="#0B132B" stroke-width="2" marker-start="url(#arrN)"/>
  <line x1="80" y1="360" x2="710" y2="360" stroke="#0B132B" stroke-width="2" marker-end="url(#arrN)"/>
  <text x="70" y="50" text-anchor="end" font-size="12" font-weight="600" fill="#0B132B">V (pu)</text>
  <text x="716" y="376" font-size="12" font-weight="600" fill="#0B132B">t</text>

  <!-- y-axis ticks -->
  <line x1="75" y1="100" x2="85" y2="100" stroke="#0B132B" stroke-width="1.5"/>
  <text x="68" y="104" text-anchor="end" font-size="11" fill="#0B132B">1,0</text>
  <line x1="75" y1="126" x2="85" y2="126" stroke="#0B132B" stroke-width="1.5"/>
  <text x="68" y="130" text-anchor="end" font-size="11" fill="#0B132B">0,9</text>
  <line x1="75" y1="256" x2="85" y2="256" stroke="#0B132B" stroke-width="1.5"/>
  <text x="68" y="260" text-anchor="end" font-size="11" fill="#0B132B">0,4</text>
  <text x="68" y="364" text-anchor="end" font-size="11" fill="#0B132B">0</text>

  <!-- ============= Reference dashed lines ============= -->
  <line x1="80" y1="100" x2="700" y2="100" stroke="#9ca3af" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="80" y1="126" x2="700" y2="126" stroke="#9ca3af" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="695" y="120" text-anchor="end" font-size="10" fill="#6b7280">limiar de afundamento (0,9 pu)</text>

  <!-- fault window shading -->
  <rect x="280" y="60" width="220" height="300" fill="#c92a2a" opacity="0.06"/>

  <!-- vertical dashed markers at fault instants -->
  <line x1="280" y1="100" x2="280" y2="360" stroke="#c92a2a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="500" y1="100" x2="500" y2="360" stroke="#c92a2a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="280" y="386" text-anchor="middle" font-size="11" fill="#c92a2a">t<tspan baseline-shift="sub" font-size="75%">i</tspan></text>
  <text x="500" y="386" text-anchor="middle" font-size="11" fill="#c92a2a">t<tspan baseline-shift="sub" font-size="75%">f</tspan></text>
  <text x="280" y="404" text-anchor="middle" font-size="10" fill="#6b7280">aplicação da falta</text>
  <text x="500" y="404" text-anchor="middle" font-size="10" fill="#6b7280">eliminação da falta</text>

  <!-- ============= Voltage profile ============= -->
  <!-- pre-fault -->
  <polyline points="80,100 280,100" fill="none" stroke="#0B132B" stroke-width="3"/>
  <!-- sag (red) -->
  <polyline points="280,100 285,256 495,256 500,100" fill="none" stroke="#c92a2a" stroke-width="3"/>
  <!-- post-fault recovery -->
  <polyline points="500,100 700,100" fill="none" stroke="#0B132B" stroke-width="3"/>

  <!-- ============= Depth annotation (vertical double arrow) ============= -->
  <line x1="390" y1="106" x2="390" y2="250" stroke="#c92a2a" stroke-width="1.5"
        marker-start="url(#arrR)" marker-end="url(#arrR)"/>
  <text x="400" y="168" font-size="12" font-weight="600" fill="#c92a2a">profundidade</text>
  <text x="400" y="184" font-size="11" fill="#c92a2a">(1,0 − V<tspan baseline-shift="sub" font-size="75%">res</tspan>)</text>

  <!-- residual voltage label -->
  <text x="390" y="276" text-anchor="middle" font-size="11" font-style="italic" fill="#c92a2a">
    V<tspan baseline-shift="sub" font-size="75%">res</tspan> ≈ 0,4 pu
  </text>

  <!-- ============= Duration annotation (horizontal double arrow) ============= -->
  <line x1="287" y1="316" x2="493" y2="316" stroke="#c92a2a" stroke-width="1.5"
        marker-start="url(#arrR)" marker-end="url(#arrR)"/>
  <text x="390" y="336" text-anchor="middle" font-size="12" font-weight="600" fill="#c92a2a">duração Δt</text>

  <!-- ============= Region labels ============= -->
  <text x="180" y="86" text-anchor="middle" font-size="11" fill="#166534">regime pré-falta</text>
  <text x="600" y="86" text-anchor="middle" font-size="11" fill="#166534">recuperação pós-falta</text>
</svg>
