<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 780" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrCtrl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F97316"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1971c2"/>
    </marker>
    <marker id="arrN" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0B132B"/>
    </marker>
    <marker id="arrP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <!-- IGBT (gate isolado + seta no emissor) + diodo antiparalelo em roda-livre -->
    <g id="sw" stroke="#0B132B" stroke-width="1.8" fill="none">
      <!-- terminais: coletor (topo) / emissor (base) -->
      <line x1="15" y1="0" x2="15" y2="9"/>
      <line x1="15" y1="41" x2="15" y2="50"/>
      <!-- leads coletor/emissor ate a linha ativa -->
      <line x1="15" y1="9" x2="10" y2="17"/>
      <line x1="10" y1="33" x2="15" y2="41"/>
      <!-- linha ativa (canal) -->
      <line x1="10" y1="16" x2="10" y2="34" stroke-width="2.4"/>
      <!-- porta isolada (gate) -->
      <line x1="5" y1="19" x2="5" y2="31" stroke-width="2.4"/>
      <line x1="5" y1="25" x2="-3" y2="25"/>
      <!-- seta do emissor (canal-n) -->
      <path d="M 15 41 L 10.2 37.5 L 14 35.2 z" fill="#0B132B" stroke="none"/>
      <!-- diodo antiparalelo (conduz emissor -> coletor) -->
      <line x1="15" y1="6" x2="30" y2="6"/>
      <line x1="30" y1="6" x2="30" y2="20"/>
      <path d="M 24 32 L 36 32 L 30 20 z" fill="#0B132B" stroke="none"/>
      <line x1="24" y1="20" x2="36" y2="20"/>
      <line x1="30" y1="32" x2="30" y2="44"/>
      <line x1="30" y1="44" x2="15" y2="44"/>
      <circle cx="15" cy="6" r="1.6" fill="#0B132B"/>
      <circle cx="15" cy="44" r="1.6" fill="#0B132B"/>
    </g>
    <!-- indutor horizontal 60px -->
    <g id="indH" stroke="#0B132B" stroke-width="2" fill="none">
      <path d="M 0 0 q 7.5 -12 15 0 q 7.5 -12 15 0 q 7.5 -12 15 0 q 7.5 -12 15 0"/>
    </g>
  </defs>

  <rect width="900" height="780" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#0B132B">
    Circuito do VSI trifásico de dois níveis com filtro LCL e controle GFL
  </text>

  <!-- ============= Barramento CC ============= -->
  <g stroke="#0B132B" stroke-width="2" fill="none">
    <line x1="80" y1="160" x2="110" y2="160" stroke-width="3"/>
    <line x1="87" y1="168" x2="103" y2="168"/>
    <line x1="80" y1="176" x2="110" y2="176" stroke-width="3"/>
    <line x1="87" y1="184" x2="103" y2="184"/>
    <line x1="95" y1="160" x2="95" y2="70"/>
    <line x1="95" y1="184" x2="95" y2="290"/>
    <line x1="95" y1="70" x2="400" y2="70"/>
    <line x1="95" y1="290" x2="400" y2="290"/>
  </g>
  <text x="62" y="178" text-anchor="middle" font-size="12" font-style="italic" fill="#0B132B">V<tspan baseline-shift="sub" font-size="75%">cc</tspan></text>
  <text x="120" y="62" font-size="10" fill="#0B132B">+</text>
  <text x="120" y="304" font-size="10" fill="#0B132B">−</text>

  <!-- ============= Pernas do inversor ============= -->
  <g stroke="#0B132B" stroke-width="2">
    <line x1="200" y1="70" x2="200" y2="95"/><line x1="200" y1="145" x2="200" y2="215"/><line x1="200" y1="265" x2="200" y2="290"/>
    <line x1="300" y1="70" x2="300" y2="95"/><line x1="300" y1="145" x2="300" y2="215"/><line x1="300" y1="265" x2="300" y2="290"/>
    <line x1="400" y1="70" x2="400" y2="95"/><line x1="400" y1="145" x2="400" y2="215"/><line x1="400" y1="265" x2="400" y2="290"/>
  </g>
  <use href="#sw" x="185" y="95"/><use href="#sw" x="285" y="95"/><use href="#sw" x="385" y="95"/>
  <use href="#sw" x="185" y="215"/><use href="#sw" x="285" y="215"/><use href="#sw" x="385" y="215"/>
  <g font-size="10" fill="#0B132B">
    <text x="150" y="124">S₁</text><text x="250" y="124">S₃</text><text x="350" y="124">S₅</text>
    <text x="150" y="244">S₄</text><text x="250" y="244">S₆</text><text x="350" y="244">S₂</text>
  </g>
  <g fill="#0B132B">
    <circle cx="200" cy="70" r="2.5"/><circle cx="300" cy="70" r="2.5"/>
    <circle cx="200" cy="290" r="2.5"/><circle cx="300" cy="290" r="2.5"/>
    <circle cx="200" cy="180" r="2.5"/><circle cx="300" cy="180" r="2.5"/><circle cx="400" cy="180" r="2.5"/>
  </g>

  <!-- ============= Saidas de fase a/b/c ============= -->
  <g stroke="#0B132B" stroke-width="2" fill="none">
    <path d="M 200 180 L 225 180 L 225 150 L 460 150"/>
    <path d="M 300 180 L 325 180 L 325 170 L 460 170"/>
    <path d="M 400 180 L 425 180 L 425 190 L 460 190"/>
  </g>
  <g font-size="10" font-style="italic" fill="#0B132B">
    <text x="448" y="146">a</text><text x="448" y="166">b</text><text x="448" y="186">c</text>
  </g>

  <!-- ============= L1 ============= -->
  <use href="#indH" x="460" y="150"/><use href="#indH" x="460" y="170"/><use href="#indH" x="460" y="190"/>
  <text x="490" y="134" text-anchor="middle" font-size="12" font-style="italic" fill="#0B132B">L<tspan baseline-shift="sub" font-size="75%">1</tspan></text>
  <g stroke="#0B132B" stroke-width="2">
    <line x1="520" y1="150" x2="620" y2="150"/><line x1="520" y1="170" x2="620" y2="170"/><line x1="520" y1="190" x2="620" y2="190"/>
  </g>

  <!-- ============= Cf (ramo shunt) ============= -->
  <g stroke="#0B132B" stroke-width="2">
    <line x1="540" y1="150" x2="540" y2="300"/><line x1="565" y1="170" x2="565" y2="300"/><line x1="590" y1="190" x2="590" y2="300"/>
    <line x1="532" y1="300" x2="548" y2="300"/><line x1="532" y1="308" x2="548" y2="308"/>
    <line x1="557" y1="300" x2="573" y2="300"/><line x1="557" y1="308" x2="573" y2="308"/>
    <line x1="582" y1="300" x2="598" y2="300"/><line x1="582" y1="308" x2="598" y2="308"/>
    <line x1="540" y1="308" x2="540" y2="330"/><line x1="565" y1="308" x2="565" y2="330"/><line x1="590" y1="308" x2="590" y2="330"/>
    <line x1="540" y1="330" x2="590" y2="330"/>
    <line x1="551" y1="338" x2="579" y2="338"/><line x1="557" y1="344" x2="573" y2="344"/><line x1="562" y1="350" x2="568" y2="350"/>
    <line x1="565" y1="330" x2="565" y2="338"/>
  </g>
  <g fill="#0B132B">
    <circle cx="540" cy="150" r="2.5"/><circle cx="565" cy="170" r="2.5"/><circle cx="590" cy="190" r="2.5"/>
  </g>
  <text x="612" y="308" font-size="12" font-style="italic" fill="#0B132B">C<tspan baseline-shift="sub" font-size="75%">f</tspan></text>

  <!-- ============= L2 ============= -->
  <use href="#indH" x="620" y="150"/><use href="#indH" x="620" y="170"/><use href="#indH" x="620" y="190"/>
  <text x="650" y="134" text-anchor="middle" font-size="12" font-style="italic" fill="#0B132B">L<tspan baseline-shift="sub" font-size="75%">2</tspan></text>
  <g stroke="#0B132B" stroke-width="2">
    <line x1="680" y1="150" x2="745" y2="150"/><line x1="680" y1="170" x2="745" y2="170"/><line x1="680" y1="190" x2="745" y2="190"/>
  </g>

  <!-- TCs tipo janela em cada fase + secundarios reunidos num coletor -->
  <g fill="none" stroke="#1971c2" stroke-width="1.8">
    <circle cx="696" cy="150" r="8"/><circle cx="706" cy="170" r="8"/><circle cx="716" cy="190" r="8"/>
  </g>
  <g stroke="#1971c2" stroke-width="1" fill="none">
    <line x1="696" y1="158" x2="696" y2="215"/>
    <line x1="706" y1="178" x2="706" y2="215"/>
    <line x1="716" y1="198" x2="716" y2="215"/>
    <line x1="696" y1="215" x2="716" y2="215"/>
  </g>
  <text x="706" y="133" text-anchor="middle" font-size="9" font-weight="600" fill="#1971c2">TC</text>
  <text x="688" y="230" text-anchor="end" font-size="10" font-style="italic" fill="#1971c2">i<tspan baseline-shift="sub" font-size="75%">abc</tspan></text>

  <!-- ============= PCC (Barra 2) ============= -->
  <line x1="745" y1="125" x2="745" y2="205" stroke="#b45309" stroke-width="5"/>
  <text x="745" y="114" text-anchor="middle" font-size="12" font-weight="700" fill="#F97316">PCC (Barra 2)</text>

  <!-- TP no PCC: primario (navy) acoplado ao secundario de medicao (azul) -->
  <line x1="745" y1="205" x2="745" y2="218" stroke="#0B132B" stroke-width="1.5"/>
  <circle cx="745" cy="226" r="9" fill="none" stroke="#0B132B" stroke-width="1.8"/>
  <circle cx="745" cy="240" r="9" fill="none" stroke="#1971c2" stroke-width="1.8"/>
  <text x="760" y="237" font-size="9" font-weight="600" fill="#1971c2">TP</text>

  <!-- rede -->
  <line x1="745" y1="165" x2="792" y2="165" stroke="#0B132B" stroke-width="2"/>
  <circle cx="822" cy="165" r="28" fill="white" stroke="#0B132B" stroke-width="2"/>
  <path d="M 803 165 q 4.75 -11 9.5 0 q 4.75 11 9.5 0 q 4.75 -11 9.5 0 q 4.75 11 9.5 0" fill="none" stroke="#0B132B" stroke-width="1.5"/>
  <text x="822" y="209" text-anchor="middle" font-size="11" font-weight="600" fill="#0B132B">Rede</text>
  <text x="822" y="222" text-anchor="middle" font-size="9" fill="#0B132B">IEEE 9 barras</text>

  <!-- ============= Controle digital (GFL-VSC) ============= -->
  <rect x="150" y="385" width="710" height="355" fill="#fff7ed" stroke="#F97316" stroke-width="2" rx="6"/>
  <text x="165" y="408" font-size="13" font-weight="700" fill="#0B132B">Controle Digital</text>

  <!-- zonas: malha interna (verde) e malhas externas (amarela) -->
  <rect x="200" y="470" width="315" height="245" fill="#f0fdf4" stroke="#166534" stroke-width="1" stroke-dasharray="4,3" rx="6"/>
  <text x="357" y="708" text-anchor="middle" font-size="9" font-style="italic" fill="#166534">malha interna de corrente + modulação</text>
  <rect x="545" y="470" width="300" height="245" fill="#fefce8" stroke="#b45309" stroke-width="1" stroke-dasharray="4,3" rx="6"/>
  <text x="695" y="694" text-anchor="middle" font-size="8" fill="#0B132B">sob defeito prioriza i<tspan baseline-shift="sub" font-size="75%">q,ref</tspan>; i<tspan baseline-shift="sub" font-size="75%">d,ref</tspan> limitado por I<tspan baseline-shift="sub" font-size="75%">max</tspan></text>
  <text x="695" y="707" text-anchor="middle" font-size="9" font-style="italic" fill="#b45309">referência de corrente — código de rede (ONS)</text>

  <!-- medicoes (tracejado azul) -->
  <path d="M 706 215 L 706 372 L 460 372 L 460 398" fill="none" stroke="#1971c2" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrB)"/>
  <path d="M 745 249 L 745 398" fill="none" stroke="#1971c2" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrB)"/>
  <text x="752" y="310" font-size="10" font-style="italic" fill="#1971c2">u<tspan baseline-shift="sub" font-size="75%">abc</tspan>(PCC)</text>

  <!-- blocos de medicao: abc->dq correntes, SRF-PLL, abc->dq tensoes -->
  <g fill="white" stroke="#0B132B" stroke-width="1.5">
    <rect x="430" y="400" width="60" height="50"/>
    <rect x="580" y="400" width="80" height="50"/>
    <rect x="700" y="400" width="60" height="50"/>
  </g>
  <line x1="430" y1="450" x2="490" y2="400" stroke="#0B132B" stroke-width="1"/>
  <line x1="700" y1="450" x2="760" y2="400" stroke="#0B132B" stroke-width="1"/>
  <g font-size="9" fill="#0B132B">
    <text x="444" y="418" text-anchor="middle">abc</text><text x="475" y="443" text-anchor="middle">dq</text>
    <text x="714" y="418" text-anchor="middle">abc</text><text x="745" y="443" text-anchor="middle">dq</text>
  </g>
  <text x="620" y="429" text-anchor="middle" font-size="11" font-weight="700" fill="#0B132B">SRF-PLL</text>

  <!-- u_dq -> PLL -->
  <g stroke="#0B132B" stroke-width="1.5">
    <line x1="700" y1="415" x2="662" y2="415" marker-end="url(#arrN)"/>
    <line x1="700" y1="435" x2="662" y2="435" marker-end="url(#arrN)"/>
  </g>
  <text x="681" y="410" text-anchor="middle" font-size="8" font-style="italic" fill="#0B132B">u<tspan baseline-shift="sub" font-size="75%">d</tspan></text>
  <text x="681" y="447" text-anchor="middle" font-size="8" font-style="italic" fill="#0B132B">u<tspan baseline-shift="sub" font-size="75%">q</tspan></text>

  <!-- theta_PLL (roxo) -->
  <line x1="580" y1="425" x2="492" y2="425" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrP)"/>
  <text x="536" y="418" text-anchor="middle" font-size="9" font-style="italic" fill="#7c3aed">θ̂<tspan baseline-shift="sub" font-size="75%">PLL</tspan></text>

  <!-- i_d / i_q descem para os somadores -->
  <line x1="445" y1="450" x2="445" y2="544" stroke="#0B132B" stroke-width="1.5" marker-end="url(#arrN)"/>
  <line x1="475" y1="450" x2="475" y2="654" stroke="#0B132B" stroke-width="1.5" marker-end="url(#arrN)"/>
  <text x="438" y="505" text-anchor="end" font-size="9" font-style="italic" fill="#0B132B">i<tspan baseline-shift="sub" font-size="75%">d</tspan></text>
  <text x="482" y="505" font-size="9" font-style="italic" fill="#0B132B">i<tspan baseline-shift="sub" font-size="75%">q</tspan></text>

  <!-- somadores -->
  <g fill="white" stroke="#0B132B" stroke-width="1.5">
    <circle cx="445" cy="555" r="9"/>
    <circle cx="475" cy="665" r="9"/>
  </g>
  <g stroke="#0B132B" stroke-width="1">
    <line x1="438.6" y1="548.6" x2="451.4" y2="561.4"/><line x1="451.4" y1="548.6" x2="438.6" y2="561.4"/>
    <line x1="468.6" y1="658.6" x2="481.4" y2="671.4"/><line x1="481.4" y1="658.6" x2="468.6" y2="671.4"/>
  </g>
  <g font-size="9" fill="#0B132B">
    <text x="433" y="543" text-anchor="end">−</text><text x="457" y="550">+</text>
    <text x="463" y="653" text-anchor="end">−</text><text x="487" y="660">+</text>
  </g>

  <!-- somadores -> PI -> dq/abc -->
  <g stroke="#0B132B" stroke-width="1.5">
    <line x1="436" y1="555" x2="397" y2="555" marker-end="url(#arrN)"/>
    <line x1="466" y1="665" x2="397" y2="665" marker-end="url(#arrN)"/>
    <line x1="335" y1="555" x2="302" y2="555" marker-end="url(#arrN)"/>
    <line x1="335" y1="665" x2="302" y2="665" marker-end="url(#arrN)"/>
  </g>
  <g fill="white" stroke="#0B132B" stroke-width="1.5">
    <rect x="335" y="535" width="60" height="40"/>
    <rect x="335" y="645" width="60" height="40"/>
  </g>
  <text x="365" y="559" text-anchor="middle" font-size="11" font-weight="700" fill="#0B132B">PI</text>
  <text x="365" y="669" text-anchor="middle" font-size="11" font-weight="700" fill="#0B132B">PI</text>

  <!-- dq -> abc -->
  <rect x="230" y="545" width="70" height="140" fill="white" stroke="#0B132B" stroke-width="1.5"/>
  <line x1="230" y1="685" x2="300" y2="545" stroke="#0B132B" stroke-width="1"/>
  <text x="248" y="572" text-anchor="middle" font-size="9" fill="#0B132B">abc</text>
  <text x="281" y="668" text-anchor="middle" font-size="9" fill="#0B132B">dq</text>
  <line x1="168" y1="615" x2="228" y2="615" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrP)"/>
  <text x="196" y="608" text-anchor="middle" font-size="9" font-style="italic" fill="#7c3aed">θ̂<tspan baseline-shift="sub" font-size="75%">PLL</tspan></text>

  <!-- dq/abc -> PWM -> gatilhos -->
  <line x1="265" y1="545" x2="265" y2="527" stroke="#0B132B" stroke-width="1.5" marker-end="url(#arrN)"/>
  <rect x="230" y="480" width="70" height="45" fill="white" stroke="#0B132B" stroke-width="1.5"/>
  <text x="265" y="507" text-anchor="middle" font-size="11" font-weight="700" fill="#0B132B">PWM</text>
  <!-- rede de gate-drive: tronco do PWM, barra de distribuicao e stubs nos gates (arcos = cruzamento sem conexao) -->
  <g stroke="#F97316" stroke-width="1.8" fill="none">
    <path d="M 268 480 L 268 296 A 6 6 0 0 1 268 284 L 268 156 A 6 6 0 0 1 268 144 L 268 120 L 281 120" marker-end="url(#arrCtrl)"/>
    <line x1="168" y1="345" x2="368" y2="345"/>
    <path d="M 168 345 L 168 296 A 6 6 0 0 1 168 284 L 168 120 L 181 120" marker-end="url(#arrCtrl)"/>
    <path d="M 368 345 L 368 296 A 6 6 0 0 1 368 284 L 368 176 A 6 6 0 0 1 368 164 L 368 156 A 6 6 0 0 1 368 144 L 368 120 L 381 120" marker-end="url(#arrCtrl)"/>
    <line x1="168" y1="240" x2="181" y2="240" marker-end="url(#arrCtrl)"/>
    <line x1="268" y1="240" x2="281" y2="240" marker-end="url(#arrCtrl)"/>
    <line x1="368" y1="240" x2="381" y2="240" marker-end="url(#arrCtrl)"/>
  </g>
  <g fill="#F97316">
    <circle cx="268" cy="345" r="2.2"/>
    <circle cx="168" cy="240" r="2.2"/><circle cx="268" cy="240" r="2.2"/><circle cx="368" cy="240" r="2.2"/>
  </g>
  <text x="258" y="368" text-anchor="end" font-size="10" fill="#F97316">pulsos de gatilho S₁–S₆</text>

  <!-- referencia de corrente: Submodulo 2.10 (ONS) -->
  <rect x="640" y="530" width="160" height="150" fill="white" stroke="#0B132B" stroke-width="1.5"/>
  <text x="720" y="610" text-anchor="middle" font-size="12" font-weight="700" fill="#0B132B">Submódulo 2.10</text>

  <!-- entrada V_PCC (do bloco abc/dq de tensao) -->
  <line x1="730" y1="450" x2="730" y2="528" stroke="#0B132B" stroke-width="1.5" marker-end="url(#arrN)"/>
  <text x="738" y="495" font-size="9" font-style="italic" fill="#0B132B">V<tspan baseline-shift="sub" font-size="75%">PCC</tspan> (pu)</text>

  <!-- parametros -->
  <g stroke="#0B132B" stroke-width="1.5">
    <line x1="852" y1="590" x2="802" y2="590" marker-end="url(#arrN)"/>
    <line x1="852" y1="630" x2="802" y2="630" marker-end="url(#arrN)"/>
  </g>
  <g font-size="9" font-style="italic" fill="#0B132B" text-anchor="end">
    <text x="854" y="584">i<tspan baseline-shift="sub" font-size="75%">d,nom</tspan></text>
    <text x="854" y="624">I<tspan baseline-shift="sub" font-size="75%">max</tspan></text>
  </g>

  <!-- saidas i_d,ref / i_q,ref -->
  <line x1="640" y1="555" x2="456" y2="555" stroke="#0B132B" stroke-width="1.5" marker-end="url(#arrN)"/>
  <text x="530" y="548" text-anchor="middle" font-size="9" font-style="italic" fill="#0B132B">i<tspan baseline-shift="sub" font-size="75%">d,ref</tspan></text>
  <line x1="640" y1="665" x2="486" y2="665" stroke="#0B132B" stroke-width="1.5" marker-end="url(#arrN)"/>
  <text x="530" y="658" text-anchor="middle" font-size="9" font-style="italic" fill="#0B132B">i<tspan baseline-shift="sub" font-size="75%">q,ref</tspan></text>
</svg>
