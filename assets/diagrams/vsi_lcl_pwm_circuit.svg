<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrCtrl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F97316"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1971c2"/>
    </marker>
    <!-- IGBT (gate isolado + seta no emissor) + diodo antiparalelo em roda-livre -->
    <g id="sw" stroke="#0B132B" stroke-width="1.8" fill="none">
      <!-- terminais: coletor (topo) / emissor (base) -->
      <line x1="15" y1="0" x2="15" y2="9"/>
      <line x1="15" y1="41" x2="15" y2="50"/>
      <!-- leads coletor/emissor ate a linha ativa -->
      <line x1="15" y1="9" x2="10" y2="17"/>
      <line x1="10" y1="33" x2="15" y2="41"/>
      <!-- linha ativa (canal) -->
      <line x1="10" y1="16" x2="10" y2="34" stroke-width="2.4"/>
      <!-- porta isolada (gate) -->
      <line x1="5" y1="19" x2="5" y2="31" stroke-width="2.4"/>
      <line x1="5" y1="25" x2="-3" y2="25"/>
      <!-- seta do emissor (canal-n) -->
      <path d="M 15 41 L 10.2 37.5 L 14 35.2 z" fill="#0B132B" stroke="none"/>
      <!-- diodo antiparalelo (conduz emissor -> coletor) -->
      <line x1="15" y1="6" x2="30" y2="6"/>
      <line x1="30" y1="6" x2="30" y2="20"/>
      <path d="M 24 32 L 36 32 L 30 20 z" fill="#0B132B" stroke="none"/>
      <line x1="24" y1="20" x2="36" y2="20"/>
      <line x1="30" y1="32" x2="30" y2="44"/>
      <line x1="30" y1="44" x2="15" y2="44"/>
      <circle cx="15" cy="6" r="1.6" fill="#0B132B"/>
      <circle cx="15" cy="44" r="1.6" fill="#0B132B"/>
    </g>
    <!-- indutor horizontal 60px -->
    <g id="indH" stroke="#0B132B" stroke-width="2" fill="none">
      <path d="M 0 0 q 7.5 -12 15 0 q 7.5 -12 15 0 q 7.5 -12 15 0 q 7.5 -12 15 0"/>
    </g>
  </defs>

  <rect width="900" height="520" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#0B132B">
    Circuito do VSI trifásico de dois níveis com filtro LCL e controle PWM
  </text>

  <!-- ============= Barramento CC ============= -->
  <g stroke="#0B132B" stroke-width="2" fill="none">
    <line x1="80" y1="160" x2="110" y2="160" stroke-width="3"/>
    <line x1="87" y1="168" x2="103" y2="168"/>
    <line x1="80" y1="176" x2="110" y2="176" stroke-width="3"/>
    <line x1="87" y1="184" x2="103" y2="184"/>
    <line x1="95" y1="160" x2="95" y2="70"/>
    <line x1="95" y1="184" x2="95" y2="290"/>
    <line x1="95" y1="70" x2="400" y2="70"/>
    <line x1="95" y1="290" x2="400" y2="290"/>
  </g>
  <text x="62" y="178" text-anchor="middle" font-size="12" font-style="italic" fill="#0B132B">V<tspan baseline-shift="sub" font-size="75%">cc</tspan></text>
  <text x="120" y="62" font-size="10" fill="#0B132B">+</text>
  <text x="120" y="304" font-size="10" fill="#0B132B">−</text>

  <!-- ============= Pernas do inversor ============= -->
  <g stroke="#0B132B" stroke-width="2">
    <line x1="200" y1="70" x2="200" y2="95"/><line x1="200" y1="145" x2="200" y2="215"/><line x1="200" y1="265" x2="200" y2="290"/>
    <line x1="300" y1="70" x2="300" y2="95"/><line x1="300" y1="145" x2="300" y2="215"/><line x1="300" y1="265" x2="300" y2="290"/>
    <line x1="400" y1="70" x2="400" y2="95"/><line x1="400" y1="145" x2="400" y2="215"/><line x1="400" y1="265" x2="400" y2="290"/>
  </g>
  <use href="#sw" x="185" y="95"/><use href="#sw" x="285" y="95"/><use href="#sw" x="385" y="95"/>
  <use href="#sw" x="185" y="215"/><use href="#sw" x="285" y="215"/><use href="#sw" x="385" y="215"/>
  <g font-size="10" fill="#0B132B">
    <text x="163" y="124">S₁</text><text x="263" y="124">S₃</text><text x="363" y="124">S₅</text>
    <text x="163" y="244">S₄</text><text x="263" y="244">S₆</text><text x="363" y="244">S₂</text>
  </g>
  <g fill="#0B132B">
    <circle cx="200" cy="70" r="2.5"/><circle cx="300" cy="70" r="2.5"/>
    <circle cx="200" cy="290" r="2.5"/><circle cx="300" cy="290" r="2.5"/>
    <circle cx="200" cy="180" r="2.5"/><circle cx="300" cy="180" r="2.5"/><circle cx="400" cy="180" r="2.5"/>
  </g>

  <!-- ============= Saidas de fase a/b/c ============= -->
  <g stroke="#0B132B" stroke-width="2" fill="none">
    <path d="M 200 180 L 225 180 L 225 150 L 460 150"/>
    <path d="M 300 180 L 325 180 L 325 170 L 460 170"/>
    <path d="M 400 180 L 425 180 L 425 190 L 460 190"/>
  </g>
  <g font-size="10" font-style="italic" fill="#0B132B">
    <text x="448" y="146">a</text><text x="448" y="166">b</text><text x="448" y="186">c</text>
  </g>

  <!-- ============= L1 ============= -->
  <use href="#indH" x="460" y="150"/><use href="#indH" x="460" y="170"/><use href="#indH" x="460" y="190"/>
  <text x="490" y="134" text-anchor="middle" font-size="12" font-style="italic" fill="#0B132B">L<tspan baseline-shift="sub" font-size="75%">1</tspan></text>
  <g stroke="#0B132B" stroke-width="2">
    <line x1="520" y1="150" x2="620" y2="150"/><line x1="520" y1="170" x2="620" y2="170"/><line x1="520" y1="190" x2="620" y2="190"/>
  </g>

  <!-- ============= Cf (ramo shunt) ============= -->
  <g stroke="#0B132B" stroke-width="2">
    <line x1="540" y1="150" x2="540" y2="300"/><line x1="565" y1="170" x2="565" y2="300"/><line x1="590" y1="190" x2="590" y2="300"/>
    <line x1="532" y1="300" x2="548" y2="300"/><line x1="532" y1="308" x2="548" y2="308"/>
    <line x1="557" y1="300" x2="573" y2="300"/><line x1="557" y1="308" x2="573" y2="308"/>
    <line x1="582" y1="300" x2="598" y2="300"/><line x1="582" y1="308" x2="598" y2="308"/>
    <line x1="540" y1="308" x2="540" y2="330"/><line x1="565" y1="308" x2="565" y2="330"/><line x1="590" y1="308" x2="590" y2="330"/>
    <line x1="540" y1="330" x2="590" y2="330"/>
    <line x1="551" y1="338" x2="579" y2="338"/><line x1="557" y1="344" x2="573" y2="344"/><line x1="562" y1="350" x2="568" y2="350"/>
    <line x1="565" y1="330" x2="565" y2="338"/>
  </g>
  <g fill="#0B132B">
    <circle cx="540" cy="150" r="2.5"/><circle cx="565" cy="170" r="2.5"/><circle cx="590" cy="190" r="2.5"/>
  </g>
  <text x="612" y="308" font-size="12" font-style="italic" fill="#0B132B">C<tspan baseline-shift="sub" font-size="75%">f</tspan></text>

  <!-- ============= L2 ============= -->
  <use href="#indH" x="620" y="150"/><use href="#indH" x="620" y="170"/><use href="#indH" x="620" y="190"/>
  <text x="650" y="134" text-anchor="middle" font-size="12" font-style="italic" fill="#0B132B">L<tspan baseline-shift="sub" font-size="75%">2</tspan></text>
  <g stroke="#0B132B" stroke-width="2">
    <line x1="680" y1="150" x2="745" y2="150"/><line x1="680" y1="170" x2="745" y2="170"/><line x1="680" y1="190" x2="745" y2="190"/>
  </g>

  <!-- sensores de corrente i_abc -->
  <g fill="white" stroke="#1971c2" stroke-width="1.5">
    <circle cx="706" cy="150" r="7"/><circle cx="706" cy="170" r="7"/><circle cx="706" cy="190" r="7"/>
  </g>
  <text x="694" y="226" text-anchor="end" font-size="10" font-style="italic" fill="#1971c2">i<tspan baseline-shift="sub" font-size="75%">abc</tspan></text>

  <!-- ============= PAC (Barra 2) ============= -->
  <line x1="745" y1="125" x2="745" y2="205" stroke="#b45309" stroke-width="5"/>
  <text x="745" y="114" text-anchor="middle" font-size="12" font-weight="700" fill="#F97316">PAC (Barra 2)</text>

  <!-- rede -->
  <line x1="745" y1="165" x2="792" y2="165" stroke="#0B132B" stroke-width="2"/>
  <circle cx="822" cy="165" r="28" fill="white" stroke="#0B132B" stroke-width="2"/>
  <path d="M 803 165 q 4.75 -11 9.5 0 q 4.75 11 9.5 0 q 4.75 -11 9.5 0 q 4.75 11 9.5 0" fill="none" stroke="#0B132B" stroke-width="1.5"/>
  <text x="822" y="209" text-anchor="middle" font-size="11" font-weight="600" fill="#0B132B">Rede</text>
  <text x="822" y="222" text-anchor="middle" font-size="9" fill="#0B132B">IEEE 9 barras</text>

  <!-- ============= Controle digital ============= -->
  <rect x="150" y="420" width="560" height="62" fill="#fff7ed" stroke="#F97316" stroke-width="2" rx="6"/>
  <text x="430" y="446" text-anchor="middle" font-size="13" font-weight="700" fill="#0B132B">Controle Digital</text>
  <text x="430" y="466" text-anchor="middle" font-size="11" fill="#0B132B">SRF-PLL (θ̂) · malhas PI de corrente em dq · modulação SPWM</text>

  <!-- pulsos de gatilho -->
  <line x1="250" y1="420" x2="250" y2="292" stroke="#F97316" stroke-width="2" marker-end="url(#arrCtrl)"/>
  <text x="243" y="360" text-anchor="end" font-size="10" fill="#F97316">pulsos de gatilho S₁–S₆</text>

  <!-- medicoes (tracejado azul) -->
  <path d="M 706 197 L 706 418" fill="none" stroke="#1971c2" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrB)"/>
  <path d="M 745 205 L 745 451 L 712 451" fill="none" stroke="#1971c2" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrB)"/>
  <text x="752" y="380" font-size="10" font-style="italic" fill="#1971c2">u<tspan baseline-shift="sub" font-size="75%">abc</tspan>(PAC)</text>
</svg>
